name: LogStream CI/CD

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Force deploy to environment'
        required: false
        default: 'dev'
        type: choice
        options: [ dev, prod ]

env:
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.11'
  AWS_REGION: 'eu-west-1'
  AWS_ACCOUNT_ID: '205930639565'

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 0: Security & Secrets Scan
  # ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets & Leaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f4 | tr -d v)_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Create Gitleaks config
        run: |
          cat > .gitleaks.toml << 'TOML'
          [allowlist]
            paths = [
              '''.*\.md$''',
              '''.*\.MD$'''
            ]
          TOML

      - name: Gitleaks scan
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --config .gitleaks.toml \
            -v

  # ─────────────────────────────────────────────────────────
  # JOB 1: Backend — Lint & Checkstyle
  # ─────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Run Checkstyle (if configured)
        working-directory: backend
        run: mvn checkstyle:check || echo "Checkstyle not configured, skipping"
        continue-on-error: true
      
      - name: Cleanup
        if: always()
        run: rm -rf ~/.m2/repository/com/amalitech

  # ─────────────────────────────────────────────────────────
  # JOB 2: Data Engineering — Lint Python
  # ─────────────────────────────────────────────────────────
  lint-data-engineering:
    name: Lint Data Engineering
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort
      
      - name: Run flake8
        working-directory: data-engineering
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Flake8 check passed"
        continue-on-error: true
      
      - name: Run black check
        working-directory: data-engineering
        run: black --check . || echo "Black formatting check completed"
        continue-on-error: true
      
      - name: Run isort check
        working-directory: data-engineering
        run: isort --check-only . || echo "isort import check completed"
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # JOB 3: Backend — Build & Test
  # ─────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [secrets-scan, lint-backend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: Run init SQL on PostgreSQL
        run: |
          PGPASSWORD=${{ secrets.DB_PASSWORD }} psql \
            -h localhost -U ${{ secrets.DB_USERNAME }} -d ${{ secrets.DB_NAME }} \
            -f "$GITHUB_WORKSPACE/data-engineering/db/ddl/schema_ddl.sql"

      - name: Build with Maven
        working-directory: backend
        run: mvn clean install -DskipTests -B

      - name: Run Backend Tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: mvn test -B

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: rm -rf ~/.m2/repository/com/amalitech

  # ─────────────────────────────────────────────────────────
  # JOB 4: Data Engineering — Install & Test
  # ─────────────────────────────────────────────────────────
  data-engineering:
    name: Data Engineering — Install & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [secrets-scan, lint-data-engineering]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: data-engineering
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: Run init SQL on PostgreSQL
        run: |
          PGPASSWORD=${{ secrets.DB_PASSWORD }} psql \
            -h localhost -p 5433 -U ${{ secrets.DB_USERNAME }} -d ${{ secrets.DB_NAME }} \
            -f "$GITHUB_WORKSPACE/data-engineering/db/ddl/schema_ddl.sql"

      - name: Run Data Engineering Tests
        working-directory: data-engineering
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PYTHONPATH: .
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-engineering-coverage
          path: data-engineering/coverage.xml
          retention-days: 7
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # JOB 5: Docker — Build All Images
  # Runs only after all tests pass
  # ─────────────────────────────────────────────────────────
  docker:
    name: Docker — Build All Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ backend, data-engineering ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          push: false
          tags: logstream-backend:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build data-engineering image
        uses: docker/build-push-action@v6
        with:
          context: data-engineering
          file: data-engineering/Dockerfile
          load: true
          push: false
          tags: logstream-data-engineering:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Verify Docker images exist
        run: docker images | grep logstream

      - name: Test backend container
        run: |
          docker run --rm logstream-backend:latest java -version
        continue-on-error: true

      - name: Test data-engineering container
        run: |
          docker run --rm logstream-data-engineering:latest python --version
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          docker system prune -af --volumes
          rm -rf /tmp/.buildx-cache

  # ─────────────────────────────────────────────────────────
  # JOB 6: Deploy → DEV
  # Triggered only on push to dev branch (not PRs)
  # ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ docker ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment:
      name: dev
      url: http://logstream-dev-alb-78023209.eu-west-1.elb.amazonaws.com

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR URLs
        id: ecr
        run: |
          BASE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "BACKEND_ECR=${BASE}/logstream-dev-backend" >> $GITHUB_OUTPUT
          echo "DE_ECR=${BASE}/logstream-dev-data-engineering" >> $GITHUB_OUTPUT
          echo "MB_ECR=${BASE}/logstream-dev-metabase" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.BACKEND_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ steps.ecr.outputs.BACKEND_ECR }}:latest

      - name: Build & push data-engineering
        uses: docker/build-push-action@v6
        with:
          context: data-engineering
          file: data-engineering/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.DE_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ steps.ecr.outputs.DE_ECR }}:latest

      - name: Check & push Metabase to ECR (only if missing)
        run: |
          EXISTS=$(aws ecr describe-images \
            --repository-name logstream-dev-metabase \
            --image-ids imageTag=latest \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "NOT_FOUND")
          if echo "$EXISTS" | grep -q "NOT_FOUND"; then
            echo "Pulling Metabase and pushing to ECR..."
            docker pull metabase/metabase:latest
            docker tag metabase/metabase:latest ${{ steps.ecr.outputs.MB_ECR }}:latest
            docker push ${{ steps.ecr.outputs.MB_ECR }}:latest
          else
            echo "Metabase already in ECR — skipping ✅"
          fi

      - name: Register new backend task definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition logstream-dev-backend \
            --region ${{ env.AWS_REGION }} \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "import sys,json; td=json.load(sys.stdin); [c.update({'image':'${{ steps.ecr.outputs.BACKEND_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}'}) for c in td['containerDefinitions'] if c.get('name')=='backend']; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")

          NEW_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "TASK_DEF_ARN=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "New task def: $NEW_ARN"

      - name: Deploy backend via CodeDeploy (Blue/Green)
        id: codedeploy
        run: |
          APPSPEC=$(cat << EOF
          {"version":"0.0","Resources":[{"TargetService":{"Type":"AWS::ECS::Service","Properties":{"TaskDefinition":"${{ steps.task-def.outputs.TASK_DEF_ARN }}","LoadBalancerInfo":{"ContainerName":"backend","ContainerPort":8080}}}}]}
          EOF
          )
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name logstream-dev-backend \
            --deployment-group-name logstream-dev-backend-dg \
            --region ${{ env.AWS_REGION }} \
            --revision "{\"revisionType\":\"AppSpecContent\",\"appSpecContent\":{\"content\":\"$(echo $APPSPEC | tr -d '\n' | sed 's/\"/\\\"/g')\"}}" \
            --description "Deploy ${{ steps.tag.outputs.IMAGE_TAG }} to dev" \
            --query 'deploymentId' --output text)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "CodeDeploy deployment: $DEPLOYMENT_ID"

      - name: Wait for CodeDeploy to finish
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy.outputs.DEPLOYMENT_ID }} \
            --region ${{ env.AWS_REGION }}
          echo "Backend live ✅"

      - name: Update data-engineering task def & EventBridge schedules
        run: |
          NEW_DE_IMAGE="${{ steps.ecr.outputs.DE_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition logstream-dev-data-engineering \
            --region ${{ env.AWS_REGION }} --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "import sys,json; td=json.load(sys.stdin); [c.update({'image':'$NEW_DE_IMAGE'}) for c in td['containerDefinitions']]; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")

          NEW_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "New data-engineering task def: $NEW_ARN"

          for SCHEDULE in logstream-dev-etl-15min logstream-dev-aggregate-hourly logstream-dev-cleanup-daily logstream-dev-retention-policy; do
            CURRENT=$(aws scheduler get-schedule --name $SCHEDULE --region ${{ env.AWS_REGION }} 2>/dev/null || echo "SKIP")
            if [ "$CURRENT" != "SKIP" ]; then
              EXPR=$(echo $CURRENT | python3 -c "import sys,json; print(json.load(sys.stdin)['ScheduleExpression'])")
              TARGET=$(echo $CURRENT | python3 -c "import sys,json; t=json.load(sys.stdin)['Target']; t['EcsParameters']['TaskDefinitionArn']='$NEW_ARN'; print(json.dumps(t))")
              aws scheduler update-schedule \
                --name $SCHEDULE \
                --region ${{ env.AWS_REGION }} \
                --schedule-expression "$EXPR" \
                --flexible-time-window '{"Mode":"OFF"}' \
                --target "$TARGET"
              echo "  $SCHEDULE updated ✅"
            fi
          done

      - name: Force redeploy Metabase
        run: |
          aws ecs update-service \
            --cluster logstream-dev \
            --service logstream-dev-metabase \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Metabase redeployment triggered ✅"

      - name: Deployment summary — DEV
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEV Deployment Complete ✅"
          echo "  Commit : ${{ github.sha }}"
          echo "  Backend: http://logstream-dev-alb-78023209.eu-west-1.elb.amazonaws.com"
          echo "  Swagger: http://logstream-dev-alb-78023209.eu-west-1.elb.amazonaws.com/swagger-ui/index.html"
          echo "  Metabase: http://logstream-dev-alb-78023209.eu-west-1.elb.amazonaws.com:3000"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────────────
  # JOB 7: Deploy → PROD
  # Triggered only on push/merge to main branch.
  # Pauses for manual approval via GitHub Environment protection.
  # ─────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → PROD
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [ docker ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: prod

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR URLs
        id: ecr
        run: |
          BASE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "BACKEND_ECR=${BASE}/logstream-prod-backend" >> $GITHUB_OUTPUT
          echo "DE_ECR=${BASE}/logstream-prod-data-engineering" >> $GITHUB_OUTPUT
          echo "MB_ECR=${BASE}/logstream-prod-metabase" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init (prod)
        working-directory: devops/terraform
        run: terraform init -backend-config=envs/prod/backend.hcl

      - name: Terraform Plan (prod)
        working-directory: devops/terraform
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PROD }}
        run: |
          terraform plan \
            -var-file=prod.tfvars \
            -var="aws_account_id=${{ env.AWS_ACCOUNT_ID }}" \
            -out=tfplan-prod

      - name: Terraform Apply (prod)
        working-directory: devops/terraform
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PROD }}
        run: terraform apply -auto-approve tfplan-prod

      - name: Get prod ALB DNS
        id: alb
        working-directory: devops/terraform
        run: echo "PROD_ALB=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT

      - name: Build & push backend (prod)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.BACKEND_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ steps.ecr.outputs.BACKEND_ECR }}:latest

      - name: Build & push data-engineering (prod)
        uses: docker/build-push-action@v6
        with:
          context: data-engineering
          file: data-engineering/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.DE_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ steps.ecr.outputs.DE_ECR }}:latest

      - name: Check & push Metabase to prod ECR
        run: |
          EXISTS=$(aws ecr describe-images \
            --repository-name logstream-prod-metabase \
            --image-ids imageTag=latest \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "NOT_FOUND")
          if echo "$EXISTS" | grep -q "NOT_FOUND"; then
            docker pull metabase/metabase:latest
            docker tag metabase/metabase:latest ${{ steps.ecr.outputs.MB_ECR }}:latest
            docker push ${{ steps.ecr.outputs.MB_ECR }}:latest
          else
            echo "Metabase already in prod ECR — skipping ✅"
          fi

      - name: Register new prod backend task definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition logstream-prod-backend \
            --region ${{ env.AWS_REGION }} \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "import sys,json; td=json.load(sys.stdin); [c.update({'image':'${{ steps.ecr.outputs.BACKEND_ECR }}:${{ steps.tag.outputs.IMAGE_TAG }}'}) for c in td['containerDefinitions'] if c.get('name')=='backend']; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")

          NEW_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TASK_DEF_ARN=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Prod task def: $NEW_ARN"

      - name: Deploy prod backend via CodeDeploy (Blue/Green)
        id: codedeploy
        run: |
          APPSPEC=$(cat << EOF
          {"version":"0.0","Resources":[{"TargetService":{"Type":"AWS::ECS::Service","Properties":{"TaskDefinition":"${{ steps.task-def.outputs.TASK_DEF_ARN }}","LoadBalancerInfo":{"ContainerName":"backend","ContainerPort":8080}}}}]}
          EOF
          )
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name logstream-prod-backend \
            --deployment-group-name logstream-prod-backend-dg \
            --region ${{ env.AWS_REGION }} \
            --revision "{\"revisionType\":\"AppSpecContent\",\"appSpecContent\":{\"content\":\"$(echo $APPSPEC | tr -d '\n' | sed 's/\"/\\\"/g')\"}}" \
            --description "Deploy ${{ steps.tag.outputs.IMAGE_TAG }} to prod" \
            --query 'deploymentId' --output text)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Wait for prod CodeDeploy
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy.outputs.DEPLOYMENT_ID }} \
            --region ${{ env.AWS_REGION }}
          echo "Prod backend live ✅"

      - name: Force redeploy prod Metabase
        run: |
          aws ecs update-service \
            --cluster logstream-prod \
            --service logstream-prod-metabase \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary — PROD
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PROD Deployment Complete ✅"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Backend : http://${{ steps.alb.outputs.PROD_ALB }}"
          echo "  Swagger : http://${{ steps.alb.outputs.PROD_ALB }}/swagger-ui/index.html"
          echo "  Metabase: http://${{ steps.alb.outputs.PROD_ALB }}:3000"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"