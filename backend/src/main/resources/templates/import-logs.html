<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>Import Logs - LogStream</title>
</head>
<body>
    <div th:replace="~{sidebar :: sidebar}"></div>
    <div th:replace="~{layout :: header}"></div>
    <div th:replace="~{layout :: alerts}"></div>

    <main class="md:ml-64 p-4 sm:p-6 lg:p-8">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden" th:classappend="${!isAdmin} ? 'opacity-50 pointer-events-none' : ''">
                <div class="bg-gradient-to-r from-indigo-600 via-blue-600 to-blue-500 px-8 py-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                            <i class="fas fa-file-import text-white text-xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-white">Import Logs from CSV</h2>
                            <p class="text-blue-100 text-sm mt-0.5">Upload CSV files to bulk import log entries</p>
                        </div>
                    </div>
                </div>
                
                <div class="p-8 space-y-8">
                    <div class="bg-indigo-50/50 border border-indigo-100 rounded-xl p-5">
                        <h3 class="font-bold text-indigo-900 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            CSV Format Requirements
                        </h3>
                        <p class="text-sm text-indigo-700 mb-3">Your CSV file must contain the following columns in order:</p>
                        <div class="bg-white rounded-lg p-4 border border-indigo-200">
                            <code class="block text-sm font-mono text-gray-800 leading-relaxed">ID, Timestamp, Service, Level, Message, Source, Created At</code>
                        </div>
                    </div>

                    <form th:action="@{/logs/import/csv}" method="post" enctype="multipart/form-data" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-4">Upload CSV File</label>
                            <div id="dropZone" class="relative border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center transition-all duration-300 hover:border-blue-400 hover:bg-blue-50/30 cursor-pointer group"
                                 onclick="document.getElementById('fileInput').click()">
                                <input type="file" id="fileInput" name="file" accept=".csv" required
                                       class="hidden" onchange="handleFileSelect(this)">
                                
                                <div id="uploadIcon" class="transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
                                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-gray-100 to-gray-200 rounded-2xl flex items-center justify-center mb-5 shadow-inner">
                                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-400"></i>
                                    </div>
                                </div>
                                
                                <div id="fileInfo" class="hidden">
                                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-green-100 to-green-200 rounded-2xl flex items-center justify-center mb-5 shadow-inner">
                                        <i class="fas fa-file-csv text-3xl text-green-600 text-3xl"></i>
                                    </div>
                                    <p id="selectedFileName" class="text-xl font-bold text-gray-900 mb-2"></p>
                                    <p id="fileSize" class="text-sm text-gray-500"></p>
                                </div>
                                
                                <div id="uploadPrompt">
                                    <p class="text-gray-700 font-semibold text-lg">Drag & drop your CSV file here</p>
                                    <p class="text-gray-400 text-sm mt-2">or <span class="text-blue-600 font-medium">browse</span> to choose</p>
                                    <p class="text-gray-300 text-xs mt-3">CSV files up to 10MB</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 pt-4">
                            <button type="submit" id="importBtn" class="flex-1 bg-gradient-to-r from-green-600 to-green-500 text-white px-8 py-4 rounded-xl font-bold hover:from-green-700 hover:to-green-600 transition-all transform hover:scale-[1.02] shadow-lg shadow-green-600/20 flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none" disabled>
                                <i class="fas fa-upload mr-3 text-lg"></i>Import Logs
                            </button>
                            <a href="/logs" class="px-8 py-4 border-2 border-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-50 hover:border-gray-300 transition-all flex items-center justify-center">
                                <i class="fas fa-times mr-3"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function handleFileSelect(input) {
            const file = input.files[0];
            const dropZone = document.getElementById('dropZone');
            const uploadIcon = document.getElementById('uploadIcon');
            const fileInfo = document.getElementById('fileInfo');
            const uploadPrompt = document.getElementById('uploadPrompt');
            const selectedFileName = document.getElementById('selectedFileName');
            const fileSize = document.getElementById('fileSize');
            const importBtn = document.getElementById('importBtn');
            
            if (file) {
                if (file.type !== 'text/csv' && !file.name.endsWith('.csv')) {
                    alert('Please select a valid CSV file');
                    input.value = '';
                    return;
                }
                
                if (file.size > 10 * 1024 * 1024) {
                    alert('File size must be less than 10MB');
                    input.value = '';
                    return;
                }
                
                uploadIcon.classList.add('hidden');
                uploadPrompt.classList.add('hidden');
                fileInfo.classList.remove('hidden');
                selectedFileName.textContent = file.name;
                fileSize.textContent = formatFileSize(file.size);
                
                dropZone.classList.remove('border-gray-300', 'hover:border-blue-400');
                dropZone.classList.add('border-green-400', 'bg-green-50/30');
                
                importBtn.removeAttribute('disabled');
            } else {
                resetDropZone();
            }
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function resetDropZone() {
            const dropZone = document.getElementById('dropZone');
            const uploadIcon = document.getElementById('uploadIcon');
            const fileInfo = document.getElementById('fileInfo');
            const uploadPrompt = document.getElementById('uploadPrompt');
            const importBtn = document.getElementById('importBtn');
            
            uploadIcon.classList.remove('hidden');
            fileInfo.classList.add('hidden');
            uploadPrompt.classList.remove('hidden');
            
            dropZone.classList.add('border-gray-300', 'hover:border-blue-400');
            dropZone.classList.remove('border-green-400', 'bg-green-50/30');
            
            importBtn.setAttribute('disabled', 'true');
        }
        
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('border-blue-400', 'bg-blue-50/30');
        });
        
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('border-blue-400', 'bg-blue-50/30');
        });
        
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('border-blue-400', 'bg-blue-50/30');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFileSelect(document.getElementById('fileInput'));
            }
        });
    </script>
</body>
</html>
