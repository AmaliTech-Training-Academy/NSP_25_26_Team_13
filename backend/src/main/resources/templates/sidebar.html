<div th:fragment="sidebar" id="sidebar" class="fixed left-0 top-0 h-screen bg-slate-900 text-white flex-col z-50 transition-all duration-300"
     th:classappend="${sidebarCollapsed ? 'w-16' : 'w-64'}">
    
    <div class="p-4 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center space-x-3" th:unless="${sidebarCollapsed}">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-stream text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold">LogStream</h1>
                <p class="text-xs text-slate-400">Log Management</p>
            </div>
        </div>
        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center mx-auto" 
             th:if="${sidebarCollapsed}">
            <i class="fas fa-stream text-xl"></i>
        </div>
        <button id="sidebarToggle" class="p-2 hover:bg-slate-800 rounded-lg transition"
                th:unless="${sidebarCollapsed}">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="/" class="sidebar-link flex items-center px-4 py-3 rounded-lg text-slate-300 hover:text-white" 
           th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}">
            <i class="fas fa-home w-6"></i><span th:unless="${sidebarCollapsed}">Dashboard</span>
        </a>
        <a href="/logs" class="sidebar-link flex items-center px-4 py-3 rounded-lg text-slate-300 hover:text-white"
           th:classappend="${#httpServletRequest.requestURI == '/logs' ? 'active' : ''}">
            <i class="fas fa-list w-6"></i><span th:unless="${sidebarCollapsed}">Logs</span>
        </a>
        <a href="/analytics" class="sidebar-link flex items-center px-4 py-3 rounded-lg text-slate-300 hover:text-white"
           th:classappend="${#httpServletRequest.requestURI == '/analytics' ? 'active' : ''}">
            <i class="fas fa-chart-bar w-6"></i><span th:unless="${sidebarCollapsed}">Analytics</span>
        </a>
        <a href="/retention" class="sidebar-link flex items-center px-4 py-3 rounded-lg text-slate-300 hover:text-white"
           th:classappend="${#httpServletRequest.requestURI == '/retention' ? 'active' : ''}">
            <i class="fas fa-cog w-6"></i><span th:unless="${sidebarCollapsed}">Retention</span>
        </a>
    </nav>

    <div class="p-4 border-t border-slate-700">
        <div class="bg-slate-800 rounded-lg p-3 mb-3" th:unless="${sidebarCollapsed}">
            <p class="text-xs text-slate-400">System Status</p>
            <p class="text-sm text-green-400"><i class="fas fa-circle text-xs mr-1"></i>Operational</p>
        </div>
        <a href="/logout" class="flex items-center px-4 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 transition">
            <i class="fas fa-sign-out-alt w-6"></i><span th:unless="${sidebarCollapsed}">Logout</span>
        </a>
    </div>
</div>
