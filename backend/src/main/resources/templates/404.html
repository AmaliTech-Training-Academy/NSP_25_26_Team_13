<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-red-100 rounded-full mb-6">
            <i class="fas fa-exclamation-triangle text-4xl text-red-600"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-4">404</h1>
        <h2 class="text-xl font-semibold text-gray-700 mb-2">Page Not Found</h2>
        <p class="text-gray-500 mb-8 max-w-md mx-auto">
            The page you are looking for does not exist or has been moved.
        </p>
        <a href="/" class="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
            <i class="fas fa-home mr-2"></i>Return to Dashboard
        </a>
    </div>
</body>
</html>
