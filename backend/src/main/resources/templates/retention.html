<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>Retention Policies - LogStream</title>
</head>
<body>
    <div th:replace="~{sidebar :: sidebar}"></div>
    <div th:replace="~{layout :: header}"></div>
    <div th:replace="~{layout :: alerts}"></div>

    <main class="md:ml-64 p-4 sm:p-6 lg:p-8">
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <h2 class="text-lg font-bold text-gray-900">Retention Policies</h2>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <div class="relative">
                            <input type="text" id="searchInput" placeholder="Search services..."
                                   class="pl-10 pr-4 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent w-full sm:w-64">
                            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        </div>
                        <select id="archiveFilter" class="border border-gray-300 rounded-md text-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">All</option>
                            <option value="true">Archive Enabled</option>
                            <option value="false">Archive Disabled</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full" id="policiesTable">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100" onclick="sortTable(0)">
                                Service <i class="fas fa-sort ml-1 text-gray-400"></i>
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase cursor-pointer hover:bg-gray-100" onclick="sortTable(1)">
                                Days <i class="fas fa-sort ml-1 text-gray-400"></i>
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">
                                Archive
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">
                                Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="tableBody">
                        <tr th:each="policy : ${policies}" class="policy-row hover:bg-gray-50">
                            <td class="px-6 py-4 text-sm text-gray-900 service-name" th:text="${policy.serviceName}"></td>
                            <td class="px-6 py-4 text-sm text-gray-900 retention-days" th:text="${policy.retentionDays}"></td>
                            <td class="px-6 py-4 text-sm">
                                <span th:if="${policy.archiveEnabled}" class="archive-badge inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                    <i class="fas fa-check mr-1"></i>Enabled
                                </span>
                                <span th:unless="${policy.archiveEnabled}" class="archive-badge inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                    <i class="fas fa-times mr-1"></i>Disabled
                                </span>
                                <span class="hidden archive-value" th:text="${policy.archiveEnabled}"></span>
                            </td>
                            <td class="px-6 py-4 text-sm space-x-2">
                                <a th:href="@{/retention/edit/{serviceName}(serviceName=${policy.serviceName})}" 
                                   class="text-blue-600 hover:text-blue-900 inline-block"
                                   th:classappend="${!isAdmin} ? 'opacity-50 cursor-not-allowed pointer-events-none' : ''">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a href="#" class="text-red-600 hover:text-red-900 inline-block" 
                                   th:attr="onclick='openDeleteModal(\'' + ${policy.serviceName} + '\')'"
                                   th:classappend="${!isAdmin} ? 'opacity-50 cursor-not-allowed pointer-events-none' : ''">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(policies)}" class="no-results">
                            <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                                No retention policies found
                            </td>
                        </tr>
                        <tr id="filterNoResults" class="no-results hidden">
                            <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                                No policies match your search criteria
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-3 border-t border-gray-200 bg-gray-50">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-700" id="resultCount">Showing <span th:text="${policies.size()}">0</span> policies</span>
                </div>
            </div>
        </div>
    </main>
    <script>
        let sortDirection = 1;
        
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const archiveFilter = document.getElementById('archiveFilter').value;
            const rows = document.querySelectorAll('.policy-row');
            let visibleCount = 0;

            rows.forEach(row => {
                const serviceName = row.querySelector('.service-name').textContent.toLowerCase();
                const archiveValue = row.querySelector('.archive-value').textContent;
                
                const matchesSearch = serviceName.includes(searchTerm);
                const matchesArchive = archiveFilter === '' || archiveValue === archiveFilter;

                if (matchesSearch && matchesArchive) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                }
            });

            const filterNoResults = document.getElementById('filterNoResults');
            const initialNoResults = document.querySelector('.no-results:not(#filterNoResults)');
            
            if (filterNoResults) {
                filterNoResults.classList.toggle('hidden', visibleCount > 0);
            }
            if (initialNoResults) {
                initialNoResults.style.display = visibleCount === 0 && rows.length > 0 ? '' : 'none';
            }

            document.getElementById('resultCount').textContent = `Showing ${visibleCount} policy${visibleCount !== 1 ? 'ies' : ''}`;
        }

        function sortTable(columnIndex) {
            const table = document.getElementById('policiesTable');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('.policy-row'));

            rows.sort((a, b) => {
                let aVal, bVal;
                if (columnIndex === 0) {
                    aVal = a.querySelector('.service-name').textContent.toLowerCase();
                    bVal = b.querySelector('.service-name').textContent.toLowerCase();
                } else {
                    aVal = parseInt(a.querySelector('.retention-days').textContent);
                    bVal = parseInt(b.querySelector('.retention-days').textContent);
                }

                if (aVal < bVal) return -1 * sortDirection;
                if (aVal > bVal) return 1 * sortDirection;
                return 0;
            });

            sortDirection *= -1;
            
            rows.forEach(row => tbody.appendChild(row));
            
            document.querySelectorAll('th').forEach(th => {
                th.querySelector('i').className = 'fas fa-sort ml-1 text-gray-400';
            });
            const sortedTh = document.querySelectorAll('th')[columnIndex];
            sortedTh.querySelector('i').className = sortDirection === 1 ? 'fas fa-sort-up ml-1 text-gray-700' : 'fas fa-sort-down ml-1 text-gray-700';
        }

        document.getElementById('searchInput').addEventListener('input', filterTable);
        document.getElementById('archiveFilter').addEventListener('change', filterTable);

        // Clear URL query params without reload after page loads
        if (window.location.search) {
            window.history.replaceState({}, document.title, '/retention');
        }
    </script>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
                    <i class="fas fa-exclamation-triangle text-red-600"></i>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 mt-4">Delete Policy</h3>
                <div class="mt-2 px-7 py-3">
                    <p class="text-sm text-gray-500">Are you sure you want to delete this retention policy? This action cannot be undone.</p>
                </div>
                <div class="items-center px-4 py-3">
                    <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-red-700">
                        Delete
                    </button>
                    <button onclick="closeDeleteModal()" class="mt-3 px-4 py-2 bg-gray-300 text-gray-700 text-base font-medium rounded-md w-full shadow-sm hover:bg-gray-400">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let deleteServiceName = '';
        
        function openDeleteModal(serviceName) {
            deleteServiceName = serviceName;
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            deleteServiceName = '';
        }
        
        document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
            if (deleteServiceName) {
                try {
                    const response = await fetch(`/api/retention/${encodeURIComponent(deleteServiceName)}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        window.location.href = '/retention?success=' + encodeURIComponent('Policy deleted successfully');
                    } else {
                        const data = await response.json();
                        alert('Failed to delete policy: ' + (data.message || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
            closeDeleteModal();
        });
    </script>
</body>
</html>
