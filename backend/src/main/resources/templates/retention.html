<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>Retention Policies - LogStream</title>
</head>
<body>
    <div th:replace="~{sidebar :: sidebar}"></div>
    <div th:replace="~{layout :: header}"></div>
    <div th:replace="~{layout :: alerts}"></div>

    <main class="md:ml-64 p-4 sm:p-6 lg:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Add Policy Form -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow p-6" th:classappend="${!isAdmin} ? 'opacity-50 pointer-events-none' : ''">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Add New Policy</h2>
                    <form id="addPolicyForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Service Name</label>
                            <select id="serviceName" required
                                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500">
                                <option value="">Select a service</option>
                                <option th:each="service : ${services}" th:value="${service}" th:text="${service}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Retention Days</label>
                            <input type="number" id="retentionDays" min="1" required
                                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" id="archiveEnabled"
                                       class="rounded border-gray-300 text-blue-600">
                                <span class="ml-2 text-sm text-gray-700">Enable Archive</span>
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                            <i class="fas fa-plus mr-2"></i>Add Policy
                        </button>
                    </form>
                </div>
            </div>

            <!-- Policies Table -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200">
                        <h2 class="text-lg font-bold text-gray-900">Retention Policies</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Service</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Days</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Archive</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr th:each="policy : ${policies}" class="hover:bg-gray-50">
                                    <td class="px-6 py-4 text-sm text-gray-900" th:text="${policy.serviceName}"></td>
                                    <td class="px-6 py-4 text-sm text-gray-900" th:text="${policy.retentionDays}"></td>
                                    <td class="px-6 py-4 text-sm">
                                        <span th:if="${policy.archiveEnabled}" class="text-green-600">
                                            <i class="fas fa-check"></i>
                                        </span>
                                        <span th:unless="${policy.archiveEnabled}" class="text-gray-400">
                                            <i class="fas fa-times"></i>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-sm space-x-2">
                                        <a th:href="@{/retention/edit/{serviceName}(serviceName=${policy.serviceName})}" 
                                           class="text-blue-600 hover:text-blue-900"
                                           th:classappend="${!isAdmin} ? 'opacity-50 cursor-not-allowed pointer-events-none' : ''">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a href="#" class="text-red-600 hover:text-red-900" 
                                           th:attr="onclick='openDeleteModal(\'' + ${policy.serviceName} + '\')'"
                                           th:classappend="${!isAdmin} ? 'opacity-50 cursor-not-allowed pointer-events-none' : ''">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(policies)}">
                                    <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                                        No retention policies found
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // Clear URL query params without reload after page loads
        if (window.location.search) {
            window.history.replaceState({}, document.title, '/retention');
        }
        
        document.getElementById('addPolicyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const serviceName = document.getElementById('serviceName').value;
            const retentionDays = parseInt(document.getElementById('retentionDays').value);
            const archiveEnabled = document.getElementById('archiveEnabled').checked;

            try {
                const response = await fetch(`/api/retention/${encodeURIComponent(serviceName)}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        serviceName: serviceName,
                        retentionDays: retentionDays,
                        archiveEnabled: archiveEnabled
                    })
                });

                if (response.ok) {
                    window.location.href = '/retention?success=' + encodeURIComponent('Policy added successfully');
                } else {
                    const data = await response.json();
                    alert('Failed to add policy: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
                    <i class="fas fa-exclamation-triangle text-red-600"></i>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 mt-4">Delete Policy</h3>
                <div class="mt-2 px-7 py-3">
                    <p class="text-sm text-gray-500">Are you sure you want to delete this retention policy? This action cannot be undone.</p>
                </div>
                <div class="items-center px-4 py-3">
                    <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-red-700">
                        Delete
                    </button>
                    <button onclick="closeDeleteModal()" class="mt-3 px-4 py-2 bg-gray-300 text-gray-700 text-base font-medium rounded-md w-full shadow-sm hover:bg-gray-400">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let deleteServiceName = '';
        
        function openDeleteModal(serviceName) {
            deleteServiceName = serviceName;
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            deleteServiceName = '';
        }
        
        document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
            if (deleteServiceName) {
                try {
                    const response = await fetch(`/api/retention/${encodeURIComponent(deleteServiceName)}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        window.location.href = '/retention?success=' + encodeURIComponent('Policy deleted successfully');
                    } else {
                        const data = await response.json();
                        alert('Failed to delete policy: ' + (data.message || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
            closeDeleteModal();
        });
    </script>
</body>
</html>
