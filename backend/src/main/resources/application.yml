spring:
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logstream}
        username: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
        defer-datasource-initialization: true
    sql:
        init:
            mode: always
    servlet:
        multipart:
            max-file-size: 50MB
            max-request-size: 50MB

jwt:
    secret: ${JWT_SECRET:logstream-secret-key-amalitech-2024-secure}
    expiration: 86400000

server:
    port: 8080

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html